# Profile-specific SMTP credentials
spring.mail.username=madi.java.consultancy@gmail.com
# The :- syntax provides an empty string fallback if the variable is missing
spring.mail.password=${MAIL_PASSWORD_SECRET:-}

# General SMTP Settings
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Optimization
spring.main.lazy-initialization=true