<div class="max-w-2xl mx-auto my-12 p-8 bg-white rounded-2xl shadow-xl border border-slate-200">
  <h2 class="text-3xl font-bold text-slate-900 mb-6">Book a Strategic Audit</h2>
  
  <form #auditForm="ngForm" (ngSubmit)="onSubmit(auditForm.value)" class="space-y-6">
    <div>
      <label class="block text-sm font-semibold text-slate-700 mb-2">Your Email Address</label>
      <input type="email" name="email" ngModel required
             class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition"
             placeholder="name@company.com">
    </div>

    <div>
      <label class="block text-sm font-semibold text-slate-700 mb-2">How can we help your project?</label>
      <textarea name="letter" ngModel required rows="5"
                class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition"
                placeholder="Briefly describe your enterprise architecture or cloud needs..."></textarea>
    </div>

    <button type="submit" [disabled]="!auditForm.valid"
            class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-slate-400 text-white font-bold py-4 rounded-lg shadow-lg transition duration-200">
      {{ isSending ? 'Sending Request...' : 'Submit Request' }}
    </button>
  </form>
</div>
