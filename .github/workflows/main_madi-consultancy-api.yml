name: CI/CD - Split Microservices Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  # --- BACKEND JOBS ---
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build Java
        run: cd microservices && mvn package -DskipTests
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: microservices/target/*.jar

  deploy-backend:
    runs-on: ubuntu-latest
    needs: build-backend
    steps:
      - uses: actions/checkout@v4
      - name: Download JAR
        uses: actions/download-artifact@v4
        with:
          name: java-app
          path: microservices/target
      - name: Set up Java 21 for Extraction
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Extract Layers
        run: |
          cd microservices
          # Matches the JAR name in your target folder
          java -Djarmode=layertools -jar target/consultancy-service-1.0.0.jar extract --destination target/extracted
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.MADICONSULTANCY_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.MADICONSULTANCY_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.MADICONSULTANCY_AZURE_SUBSCRIPTION_ID }}
      - name: Deploy Backend
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: ${{ github.workspace }}/microservices
          acrName: madi1registry
          acrUsername: madi1registry
          acrPassword: ${{ secrets.ACR_PASSWORD }}
          containerAppName: madi-consultancy-api
          resourceGroup: DefaultResourceGroup-CHN
          environmentVariables: >-
            SPRING_PROFILES_ACTIVE=prod
            SPRING_MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            SPRING_MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}

  # --- FRONTEND JOB ---
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.MADICONSULTANCY_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.MADICONSULTANCY_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.MADICONSULTANCY_AZURE_SUBSCRIPTION_ID }}
      - name: Build and deploy Frontend
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: ${{ github.workspace }}/frontend
          acrName: madi1registry
          acrUsername: madi1registry
          acrPassword: ${{ secrets.ACR_PASSWORD }}
          containerAppName: madi-consultancy-ui
          resourceGroup: DefaultResourceGroup-CHN
