server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        # This line is critical: it prevents 404s on page refresh
        try_files $uri $uri/ /index.html;
    }

    # Optional: If you want to proxy /api calls to your backend container internally
    # location /api/ {
    #    proxy_pass https://azurecontainerapps.io;
    # }
}
