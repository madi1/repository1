name: CI/CD - Build and deploy Spring Boot backend

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Updated to v4 to fix Node.js warnings

      - name: Build Angular
        run: |
          cd angular
          npm install
          npm run build -- --output-path=dist

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Build Java with Maven
        run: |
          # 1. Ensure the static resources folder exists
          mkdir -p microservices/src/main/resources/static
          
          # 2. Force Copy: This moves the Angular build into the Java resources
          # This command handles all common Angular 17+ output paths
          cp -r angular/dist/browser/* microservices/src/main/resources/static/ || \
          cp -r angular/dist/angular/browser/* microservices/src/main/resources/static/ || \
          cp -r angular/dist/* microservices/src/main/resources/static/ || \
          echo "WARNING: No Angular build files found!"
          
          # 3. Build the JAR (without 'clean' to preserve the copied files)
          cd microservices
          mvn package -DskipTests

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: microservices/target/*.jar

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: java-app
          path: java-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F82D296C74BB49F689EDD9DF204FF751 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B6AAD347299F4A2CABA5A79110036447 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_63EAD57DE0E14A61BCEA39691FC8584A }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'madi-consultancy-api'
          package: 'java-app/*.jar'
