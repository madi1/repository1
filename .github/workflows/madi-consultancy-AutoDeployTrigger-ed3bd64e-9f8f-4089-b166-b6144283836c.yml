name: Trigger auto deployment for madi-consultancy

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - 'microservices/**'
    - '.github/workflows/madi-consultancy-AutoDeployTrigger-ed3bd64e-9f8f-4089-b166-b6144283836c.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.MADICONSULTANCY_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.MADICONSULTANCY_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.MADICONSULTANCY_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/microservices
          dockerfilePath: Dockerfile
          registryUrl: madi1registry.azurecr.io
          registryUsername: ${{ secrets.MADICONSULTANCY_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.MADICONSULTANCY_REGISTRY_PASSWORD }}
          containerAppName: madi-consultancy
          resourceGroup: DefaultResourceGroup-CHN
          imageToBuild: madi1registry.azurecr.io/madi-consultancy:${{ github.sha }}
