<!-- Increased max-width to 4xl to allow for a wider/longer layout -->
<div class="max-w-4xl mx-auto my-12 p-10 bg-white rounded-2xl shadow-xl border border-slate-200">
  <h2 class="text-4xl font-bold text-slate-900 mb-10">Book a Strategic Audit</h2>
  
  <form #auditForm="ngForm" (ngSubmit)="onSubmit(auditForm.value)" class="space-y-10">
    <!-- Email Section: Larger text and padding -->
    <div>
      <label class="block text-lg font-semibold text-slate-700 mb-3">Your Email Address</label>
      <input type="email" name="email" ngModel required
             class="w-full px-5 py-4 text-lg rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition"
             placeholder="name@company.com">
    </div>

    <!-- Comments Section: Label and Box side-by-side -->
    <div class="flex flex-col md:flex-row gap-8">
      <!-- Label at the same upper level -->
      <label class="md:w-1/4 text-lg font-semibold text-slate-700 pt-3">
        How can we help your project?
      </label>
      
      <!-- Textarea: Wider and longer (rows="8") -->
      <textarea name="letter" ngModel required rows="8"
                class="flex-1 px-5 py-4 text-lg rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-600 focus:border-transparent outline-none transition"
                placeholder="Briefly describe your enterprise architecture or cloud needs..."></textarea>
    </div>

    <button type="submit" [disabled]="!auditForm.valid"
            class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-slate-400 text-white text-xl font-bold py-5 rounded-lg shadow-lg transition duration-200">
      {{ isSending ? 'Sending Request...' : 'Submit Request' }}
    </button>
  </form>
</div>
