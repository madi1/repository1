<div class="max-w-6xl mx-auto my-12 p-10 bg-white rounded-2xl shadow-xl border border-slate-200">
  <h2 class="text-4xl font-bold text-slate-900 mb-10">Book a Strategic Audit</h2>
  
  <form #auditForm="ngForm" (ngSubmit)="onSubmit(auditForm.value)">
    
    <!-- Email Section: 'mb-20' provides the large margin below -->
    <div class="flex flex-col gap-3 mb-20">
      <label class="text-lg font-semibold text-slate-700">Your Email Address</label>
      <input type="email" name="email" ngModel required
            class="w-full px-5 py-4 text-lg rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-600 outline-none transition"
            placeholder="name@company.com">
    </div>

    <!-- Comments Section: Removed the extra div and used flex for side-by-side -->
    <div class="flex flex-col md:flex-row gap-8 items-start mb-10">
      <label class="w-full md:w-1/5 flex-shrink-0 text-lg font-semibold text-slate-700 pt-3">
        How can we help your project?
      </label>
      
      <!-- 'flex-1' and 'w-full' makes this box take up all remaining width -->
      <textarea name="letter" ngModel required rows="10" 
                class="w-full flex-1 px-5 py-4 text-lg rounded-lg border border-slate-300 focus:ring-2 focus:ring-blue-600 outline-none transition"
                placeholder="Briefly describe your enterprise architecture or cloud needs...">
      </textarea>
    </div>

    <button type="submit" [disabled]="!auditForm.valid"
            class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-slate-400 text-white text-xl font-bold py-5 rounded-lg shadow-lg transition duration-200">
      {{ isSending ? 'Sending Request...' : 'Submit Request' }}
    </button>
  </form>
</div>
